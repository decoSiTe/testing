<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool ID – QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c10;--surface:#0f1519;--surface2:#161e25;
  --border:#1e2d38;--accent:#00d4ff;--accent2:#ff6b35;
  --text:#e8f4f8;--muted:#4a6274;--success:#00e5a0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.01) 2px,rgba(0,212,255,0.01) 4px);pointer-events:none;z-index:0;}

#gen-page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,5.5rem);letter-spacing:0.08em;line-height:1;margin-bottom:6px;}
.logo span{color:var(--accent);}
.tagline{font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:52px;}
.card{width:100%;max-width:500px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 40px;position:relative;box-shadow:0 40px 120px rgba(0,0,0,0.6);}
.card::before{content:'';position:absolute;top:-1px;left:30px;right:30px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);border-radius:2px;}
.step{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#000;font-size:0.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-label{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
.field-block{margin-bottom:28px;}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color 0.25s,background 0.25s;position:relative;overflow:hidden;background:var(--surface2);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(0,212,255,0.04);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:2.2rem;margin-bottom:10px;}
.upload-zone p{color:var(--muted);font-size:0.82rem;line-height:1.5;}
.upload-zone p strong{color:var(--accent);}
.preview-thumb{display:none;width:100%;border-radius:10px;object-fit:cover;max-height:180px;border:1px solid var(--border);}
.preview-thumb.show{display:block;}
.change-photo{margin-top:10px;font-size:0.72rem;color:var(--muted);cursor:pointer;text-decoration:underline;text-align:center;display:none;}
.change-photo.show{display:block;}
.text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.text-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}
.text-input::placeholder{color:var(--muted);}
.gen-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#0099cc);border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.12em;color:#000;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s,opacity 0.2s;box-shadow:0 8px 32px rgba(0,212,255,0.2);}
.gen-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,212,255,0.35);}
.gen-btn:disabled{opacity:0.4;cursor:not-allowed;}
#qr-result{display:none;flex-direction:column;align-items:center;gap:18px;margin-top:36px;animation:rise 0.4s ease both;}
#qr-result.show{display:flex;}
@keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.qr-wrap{background:#fff;padding:16px;border-radius:16px;box-shadow:0 0 0 1px var(--border),0 20px 60px rgba(0,0,0,0.5);}
#qrcode canvas,#qrcode img{display:block;}
.qr-caption{text-align:center;font-size:0.74rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);line-height:1.8;}
.qr-caption span{color:var(--success);font-weight:600;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.ghost-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:10px 22px;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.ghost-btn:hover{border-color:var(--accent);color:var(--accent);}
.ghost-btn.hl{border-color:var(--accent2);color:var(--accent2);}
.ghost-btn.hl:hover{background:rgba(255,107,53,0.08);}

/* RESULT PAGE */
#result-page{display:none;min-height:100vh;background:var(--bg);position:relative;z-index:1;}
#result-page.show{display:block;}
.result-hero{position:relative;width:100%;overflow:hidden;background:#000;max-height:72vh;}
.result-hero img{width:100%;display:block;object-fit:cover;max-height:72vh;opacity:0.9;}
.hero-overlay{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to top,rgba(8,12,16,1) 0%,rgba(8,12,16,0.65) 50%,transparent 100%);}
.hero-badge{position:absolute;bottom:0;left:0;right:0;padding:28px 28px 32px;}
.owner-label{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:block;}
.owner-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,8vw,4rem);letter-spacing:0.04em;line-height:1;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,0.8);}
.owner-cat{font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:0.08em;}
.id-strip{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;}
.id-pill{display:flex;align-items:center;gap:8px;font-size:0.74rem;color:var(--muted);}
.pip{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.id-pill strong{color:var(--text);font-weight:600;}
.result-nav{padding:20px 28px 0;}
.back-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:9px 16px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:0.78rem;cursor:pointer;transition:color 0.2s,border-color 0.2s;}
.back-btn:hover{color:var(--text);border-color:var(--muted);}
.result-footer{text-align:center;padding:36px 24px 48px;color:var(--muted);font-size:0.68rem;letter-spacing:0.1em;}
</style>
</head>
<body>

<div id="gen-page">
  <div class="logo">TOOL<span>ID</span></div>
  <div class="tagline">Upload · Name · Generate · Scan</div>
  <div class="card">
    <div class="field-block">
      <div class="step"><div class="step-num">1</div><div class="step-label">Upload Tool Photo</div></div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="photo-input" accept="image/*">
        <div id="upload-placeholder">
          <div class="upload-icon">📷</div>
          <p><strong>Click or drag & drop</strong><br>your tools photo here</p>
        </div>
        <img class="preview-thumb" id="preview-thumb" alt="Preview">
      </div>
      <div class="change-photo" id="change-photo" onclick="resetPhoto()">↺ Change photo</div>
    </div>
    <div class="field-block">
      <div class="step"><div class="step-num">2</div><div class="step-label">Owner / Tool Name</div></div>
      <input type="text" class="text-input" id="input-name" placeholder="e.g. Ryan Ynion">
    </div>
    <div class="field-block">
      <div class="step"><div class="step-num">3</div><div class="step-label">Category (optional)</div></div>
      <input type="text" class="text-input" id="input-cat" placeholder="e.g. Culinary Tools · Baking Kit">
    </div>
    <button class="gen-btn" id="gen-btn" onclick="generate()" disabled>GENERATE QR CODE</button>
    <div id="qr-result">
      <div class="qr-caption">QR code ready — <span>✓ Scan to view photo</span></div>
      <div class="qr-wrap"><div id="qrcode"></div></div>
      <div class="btn-row">
        <button class="ghost-btn" onclick="downloadQR()">↓ Save QR PNG</button>
        <button class="ghost-btn hl" onclick="previewResult()">👁 Preview Result</button>
      </div>
    </div>
  </div>
</div>

<div id="result-page">
  <div class="result-nav">
    <button class="back-btn" onclick="goBack()">← Generator</button>
  </div>
  <div class="result-hero">
    <img id="result-photo" src="" alt="Tool photo">
    <div class="hero-overlay"></div>
    <div class="hero-badge">
      <span class="owner-label">Tool Owner</span>
      <div class="owner-name" id="result-name">—</div>
      <div class="owner-cat" id="result-cat"></div>
    </div>
  </div>
  <div class="id-strip">
    <div class="id-pill"><div class="pip"></div><span>Status: <strong>Active</strong></span></div>
    <div class="id-pill" id="result-id-label"></div>
    <div class="id-pill" id="result-ts"></div>
  </div>
  <div class="result-footer" id="result-footer">TOOL ID SYSTEM</div>
</div>

<script>
let photoDataURL = null;

const photoInput = document.getElementById('photo-input');
const uploadZone = document.getElementById('upload-zone');
const previewThumb = document.getElementById('preview-thumb');
const uploadPlaceholder = document.getElementById('upload-placeholder');
const changePhotoEl = document.getElementById('change-photo');
const genBtn = document.getElementById('gen-btn');

photoInput.addEventListener('change', e => { if(e.target.files[0]) readPhoto(e.target.files[0]); });
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) readPhoto(f);
});

function readPhoto(file) {
  const r = new FileReader();
  r.onload = ev => {
    photoDataURL = ev.target.result;
    previewThumb.src = photoDataURL;
    previewThumb.classList.add('show');
    uploadPlaceholder.style.display = 'none';
    changePhotoEl.classList.add('show');
    checkReady();
  };
  r.readAsDataURL(file);
}

function resetPhoto() {
  photoDataURL = null;
  photoInput.value = '';
  previewThumb.classList.remove('show');
  previewThumb.src = '';
  uploadPlaceholder.style.display = '';
  changePhotoEl.classList.remove('show');
  checkReady();
}

document.getElementById('input-name').addEventListener('input', checkReady);
function checkReady() {
  genBtn.disabled = !(photoDataURL && document.getElementById('input-name').value.trim());
}

function generate() {
  const name = document.getElementById('input-name').value.trim();
  const cat  = document.getElementById('input-cat').value.trim();
  const ts   = new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  sessionStorage.setItem('toolid_photo', photoDataURL);
  sessionStorage.setItem('toolid_name',  name);
  sessionStorage.setItem('toolid_cat',   cat);
  sessionStorage.setItem('toolid_ts',    ts);
  const url = location.origin + location.pathname + '?view=result';
  const container = document.getElementById('qrcode');
  container.innerHTML = '';
  new QRCode(container, {text:url,width:220,height:220,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
  const res = document.getElementById('qr-result');
  res.classList.add('show');
  res.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function downloadQR() {
  const canvas = document.querySelector('#qrcode canvas');
  if(!canvas) return;
  const a = document.createElement('a');
  a.download = 'toolid-qr.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function showResult(photo, name, cat, ts) {
  document.getElementById('gen-page').style.display = 'none';
  document.getElementById('result-page').classList.add('show');
  document.getElementById('result-photo').src = photo;
  document.getElementById('result-name').textContent = name;
  const catEl = document.getElementById('result-cat');
  catEl.textContent = cat || '';
  catEl.style.display = cat ? 'block' : 'none';
  document.getElementById('result-id-label').textContent = name;
  document.getElementById('result-ts').textContent = ts ? 'Registered: ' + ts : '';
  document.getElementById('result-footer').textContent = name + ' · TOOL ID';
}

function previewResult() {
  const name = document.getElementById('input-name').value.trim();
  const cat  = document.getElementById('input-cat').value.trim();
  const ts   = new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  if(!photoDataURL || !name) return;
  history.pushState({}, '', '?view=result');
  showResult(photoDataURL, name, cat, ts);
}

function goBack() {
  document.getElementById('result-page').classList.remove('show');
  document.getElementById('gen-page').style.display = 'flex';
  history.pushState({}, '', location.pathname);
}

// Auto-show result if QR was scanned
const params = new URLSearchParams(location.search);
if(params.get('view') === 'result') {
  const photo = sessionStorage.getItem('toolid_photo');
  const name  = sessionStorage.getItem('toolid_name');
  const cat   = sessionStorage.getItem('toolid_cat');
  const ts    = sessionStorage.getItem('toolid_ts');
  if(photo && name) showResult(photo, name, cat, ts);
}
</script>
</body>
</html>
